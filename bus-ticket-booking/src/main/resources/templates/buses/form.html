<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${bus.busId == null} ? 'Add Bus' : 'Edit Bus'"> — BusRoute</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo"><span class="logo-icon">🚌</span>BusRoute</a>
    <nav class="nav">
      <a href="/">Dashboard</a>
      <a href="/buses" class="active">Buses</a>
      <a href="/passengers">Passengers</a>
      <a href="/bookings">Bookings</a>
      <a href="/search">Search</a>
    </nav>
  </div>
</header>

<div class="wrapper">
  <div class="page-title">
    <p class="breadcrumb">
      <a href="/">Home</a> / <a href="/buses">Buses</a> /
      <span th:text="${bus.busId == null} ? 'Add New' : 'Edit'">Form</span>
    </p>
    <h2 th:text="${bus.busId == null} ? 'Add New Bus' : 'Edit Bus'">Bus Form</h2>
  </div>

  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <div style="max-width: 720px;">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Bus Details</span>
        <span class="card-badge badge-active" th:if="${bus.busId != null}">Editing</span>
        <span class="card-badge badge-confirm" th:if="${bus.busId == null}">New</span>
      </div>

      <!-- POST to /buses/add (new) or /buses/{id}/update (edit) -->
      <form th:action="${bus.busId == null} ? '/buses/add' : '/buses/' + ${bus.busId} + '/update'"
            method="post"
            th:object="${bus}">

        <div class="form-section">
          <p class="form-section-title">Identity</p>
          <div class="form-row">
            <div class="form-group">
              <label for="busName">Bus Name</label>
              <input type="text" id="busName" name="busName"
                     th:value="*{busName}" placeholder="Royal Travels" required/>
            </div>
            <div class="form-group">
              <label for="busNumber">Bus Number</label>
              <input type="text" id="busNumber" name="busNumber"
                     th:value="*{busNumber}" placeholder="TN01AB1234" required/>
              <span class="field-hint">Must be unique</span>
            </div>
          </div>
        </div>

        <div class="form-section">
          <p class="form-section-title">Route</p>
          <div class="form-row">
            <div class="form-group">
              <label for="source">Source (From)</label>
              <input type="text" id="source" name="source"
                     th:value="*{source}" placeholder="Chennai" required/>
            </div>
            <div class="form-group">
              <label for="destination">Destination (To)</label>
              <input type="text" id="destination" name="destination"
                     th:value="*{destination}" placeholder="Bangalore" required/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="departureTime">Departure Time</label>
              <input type="text" id="departureTime" name="departureTime"
                     th:value="*{departureTime}" placeholder="08:00 AM" required/>
            </div>
            <div class="form-group">
              <label for="arrivalTime">Arrival Time</label>
              <input type="text" id="arrivalTime" name="arrivalTime"
                     th:value="*{arrivalTime}" placeholder="02:00 PM" required/>
            </div>
          </div>
        </div>

        <div class="form-section">
          <p class="form-section-title">Capacity &amp; Pricing</p>
          <div class="form-row">
            <div class="form-group">
              <label for="totalSeats">Total Seats</label>
              <input type="number" id="totalSeats" name="totalSeats"
                     th:value="*{totalSeats}" placeholder="40" min="1" required/>
            </div>
            <div class="form-group">
              <label for="ticketPrice">Ticket Price (₹)</label>
              <input type="number" id="ticketPrice" name="ticketPrice"
                     th:value="*{ticketPrice}" placeholder="450.00" min="0" step="0.01" required/>
            </div>
          </div>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-primary"
                  th:text="${bus.busId == null} ? 'Add Bus' : 'Update Bus'">Save</button>
          <a href="/buses" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
