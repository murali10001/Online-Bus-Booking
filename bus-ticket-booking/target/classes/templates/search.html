<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search — BusRoute</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo"><span class="logo-icon">🚌</span>BusRoute</a>
    <nav class="nav">
      <a href="/">Dashboard</a>
      <a href="/buses">Buses</a>
      <a href="/passengers">Passengers</a>
      <a href="/bookings">Bookings</a>
      <a href="/search" class="active">Search</a>
    </nav>
  </div>
</header>

<div class="wrapper">
  <div class="page-title">
    <p class="breadcrumb"><a href="/">Home</a> / Search</p>
    <h2>Find a Bus</h2>
  </div>

  <!-- Search Form — params passed via @RequestParam -->
  <div class="search-bar">
    <form method="get" action="/search">
      <div class="form-group">
        <label for="source">From</label>
        <input type="text" id="source" name="source"
               th:value="${source}" placeholder="Chennai" required/>
      </div>
      <div class="form-group">
        <label for="destination">To</label>
        <input type="text" id="destination" name="destination"
               th:value="${destination}" placeholder="Bangalore" required/>
      </div>
      <div class="form-group" style="max-width:100px;">
        <label for="seats">Seats</label>
        <input type="number" id="seats" name="seats"
               th:value="${seats}" value="1" min="1"/>
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:22px;">Search Buses</button>
    </form>
  </div>

  <!-- Results -->
  <div th:if="${searched}">
    <div th:if="${buses != null and !buses.isEmpty()}">
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:16px;"
         th:text="${buses.size()} + ' bus(es) found from ' + ${source} + ' → ' + ${destination}"></p>
      <div class="grid-auto">
        <div class="card" th:each="bus : ${buses}">
          <div class="card-header">
            <span class="card-title" th:text="${bus.busName}">—</span>
            <span class="card-badge badge-active" th:text="${bus.busNumber}">—</span>
          </div>
          <div class="data-list">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px;background:var(--bg-panel);border-radius:var(--radius);">
              <div>
                <p style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);">FROM</p>
                <p style="font-family:var(--font-head);font-weight:800;font-size:16px;" th:text="${bus.source}">—</p>
                <p style="font-size:11px;color:var(--text-muted);" th:text="${bus.departureTime}">—</p>
              </div>
              <div style="flex:1;text-align:center;color:var(--accent);">→</div>
              <div style="text-align:right;">
                <p style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);">TO</p>
                <p style="font-family:var(--font-head);font-weight:800;font-size:16px;" th:text="${bus.destination}">—</p>
                <p style="font-size:11px;color:var(--text-muted);" th:text="${bus.arrivalTime}">—</p>
              </div>
            </div>
            <div class="data-row">
              <span class="data-key">Price/Seat</span>
              <span class="data-val highlight" th:text="'₹' + ${bus.ticketPrice}">—</span>
            </div>
            <div class="data-row">
              <span class="data-key">Available</span>
              <span class="data-val" th:text="${bus.availableSeats} + ' seats'">—</span>
            </div>
          </div>
          <div class="seat-meter" style="margin:12px 0;">
            <div class="seat-meter-track">
              <div class="seat-meter-fill"
                   th:classappend="${bus.availableSeats == 0} ? ' full' : (${bus.availableSeats <= bus.totalSeats / 4} ? ' warn' : '')"
                   th:style="'width:' + (${bus.availableSeats} * 100 / ${bus.totalSeats}) + '%'"></div>
            </div>
          </div>
          <div style="margin-top:12px;">
            <a th:href="@{/bookings/new(busId=${bus.busId})}" class="btn btn-primary btn-full">Book Now</a>
          </div>
        </div>
      </div>
    </div>

    <div class="empty-state" th:if="${buses == null or buses.isEmpty()}">
      <div class="icon">🔍</div>
      <p>No buses found for <strong th:text="${source} + ' → ' + ${destination}">this route</strong>.</p>
    </div>
  </div>

</div>
</body>
</html>
